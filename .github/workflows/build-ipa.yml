name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest

    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 读取证书与描述文件
        run: |
          RAW_CERT_DIR="${{ secrets.CERT_DIR }}"

          if [ -n "$RAW_CERT_DIR" ]; then
            case "$RAW_CERT_DIR" in
              /*) CERT_DIR="$RAW_CERT_DIR" ;;
              *) CERT_DIR="$GITHUB_WORKSPACE/$RAW_CERT_DIR" ;;
            esac
          else
            CERT_DIR="$(find "$GITHUB_WORKSPACE" -maxdepth 2 -type d | while read -r dir; do
              if find "$dir" -maxdepth 1 -type f -name '*.p12' | grep -q . &&
                 find "$dir" -maxdepth 1 -type f -name '*.mobileprovision' | grep -q . &&
                 find "$dir" -maxdepth 1 -type f \( -name '密码*.txt' -o -iname '*password*.txt' \) | grep -q .; then
                echo "$dir"
              fi
            done | head -n 1)"
          fi

          if [ -z "$CERT_DIR" ] || [ ! -d "$CERT_DIR" ]; then
            echo "未找到证书目录。请将 CERT_DIR 设为仓库内证书目录名，或在仓库根目录保留唯一一个证书目录。"
            exit 1
          fi

          echo "使用证书目录: $CERT_DIR"

          P12_PATH="$(find "$CERT_DIR" -maxdepth 1 -type f -name '*.p12' | head -n 1)"
          PROFILE_PATH="$(find "$CERT_DIR" -maxdepth 1 -type f -name '*.mobileprovision' | head -n 1)"
          PASSWORD_FILE="$(find "$CERT_DIR" -maxdepth 1 -type f \( -name '密码*.txt' -o -iname '*password*.txt' \) | head -n 1)"
          
          if [ ! -f "$P12_PATH" ] || [ ! -f "$PROFILE_PATH" ] || [ ! -f "$PASSWORD_FILE" ]; then
            echo "证书文件不完整，请确认目录下包含 p12、mobileprovision 和 密码.txt"
            exit 1
          fi
          
          P12_PASSWORD="$(sed -n 's/.*密码[:：]//p' "$PASSWORD_FILE" | tr -d '\r\n ')"
          
          if [ -z "$P12_PASSWORD" ]; then
            echo "未读取到证书密码"
            exit 1
          fi
          
          # 从描述文件中获取 App ID（bundleIdentifier）
          PROFILE_INFO="$(security cms -D -i "$PROFILE_PATH")"
          APPLICATION_IDENTIFIER="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' /dev/stdin)"
          APP_ID="$(echo "$APPLICATION_IDENTIFIER" | sed 's/^[^.]*\.//')"
          
          if [ -z "$APPLICATION_IDENTIFIER" ] || [ -z "$APP_ID" ] || [ "$APP_ID" = "$APPLICATION_IDENTIFIER" ] || [ "$APP_ID" = "*" ]; then
            echo "未从描述文件中正确解析出 bundle identifier"
            exit 1
          fi
          
          echo "APPLICATION_IDENTIFIER=$APPLICATION_IDENTIFIER" >> $GITHUB_ENV
          echo "APP_ID=$APP_ID" >> $GITHUB_ENV
          echo "P12_PATH=$P12_PATH" >> $GITHUB_ENV
          echo "PROFILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          echo "P12_PASSWORD=$P12_PASSWORD" >> $GITHUB_ENV

      - name: 同步 iOS Bundle Identifier
        run: |
          node -e 'const fs = require("fs"); const path = "app.json"; const data = JSON.parse(fs.readFileSync(path, "utf8")); data.expo ||= {}; data.expo.ios ||= {}; data.expo.ios.bundleIdentifier = process.env.APP_ID; fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");'
          echo "已将 iOS bundleIdentifier 同步为: $APP_ID"

      - name: 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: 固定 Xcode Node 环境
        run: |
          NODE_PATH="$(node -p 'process.execPath')"
          cat > ios/.xcode.env.local <<EOF
          export NODE_BINARY="$NODE_PATH"
          EOF
          echo "Xcode NODE_BINARY=$NODE_PATH"

      - name: 安装 CocoaPods
        run: |
          if [ -f ios/Podfile ]; then
            pod install --project-directory=ios
          fi

      - name: 预检 JS Bundle
        run: |
          export PROJECT_ROOT="$GITHUB_WORKSPACE"
          export NODE_BINARY="$(node -p 'process.execPath')"
          export ENTRY_FILE="$("$NODE_BINARY" -e "require('expo/scripts/resolveAppEntry')" "$PROJECT_ROOT" ios absolute | tail -n 1)"
          export CLI_PATH="$("$NODE_BINARY" --print "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })")"
          export BUNDLE_COMMAND="export:embed"
          export CONFIGURATION="Release"
          export PLATFORM_NAME="iphoneos"
          export SKIP_BUNDLING=0
          export USE_HERMES=1
          echo "ENTRY_FILE=$ENTRY_FILE"
          "$NODE_BINARY" "$CLI_PATH" export:embed --platform ios --dev false

      - name: 调整 Pod 编译参数
        run: |
          if [ -f "ios/Pods/Target Support Files/ZXingObjC/ZXingObjC.debug.xcconfig" ]; then
            ruby -e 'Dir["ios/Pods/Target Support Files/**/*.xcconfig"].each do |path|
              content = File.read(path)
              content.gsub!(/-Werror=non-modular-include-in-framework-module/, "-Wno-non-modular-include-in-framework-module")
              content.gsub!(/-Werror=return-type/, "-Wno-error=return-type")
              content.gsub!(/-Werror=deprecated-objc-isa-usage/, "-Wno-error=deprecated-objc-isa-usage")
              content.gsub!(/-Werror=objc-root-class/, "-Wno-error=objc-root-class")
              File.write(path, content)
            end'
          fi

      - name: 导入证书并安装描述文件
        run: |
          KEYCHAIN_PASSWORD="signing-${RANDOM}${RANDOM}"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          
          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          
          PROFILE_INFO="$(security cms -D -i "$PROFILE_PATH")"
          PROFILE_UUID="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin)"
          PROFILE_NAME="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin)"
          TEAM_ID="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' /dev/stdin)"
          GET_TASK_ALLOW="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print Entitlements:get-task-allow' /dev/stdin)"
          PROVISIONS_ALL="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print ProvisionsAllDevices' /dev/stdin 2>/dev/null || echo 'false')"
          HAS_DEVICES="$(echo "$PROFILE_INFO" | /usr/libexec/PlistBuddy -c 'Print ProvisionedDevices' /dev/stdin 2>/dev/null | head -n 1 || true)"
          
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          
          if [ "$GET_TASK_ALLOW" = "true" ]; then
            EXPORT_METHOD="debugging"
          elif [ "$PROVISIONS_ALL" = "true" ]; then
            EXPORT_METHOD="enterprise"
          elif [ -n "$HAS_DEVICES" ]; then
            EXPORT_METHOD="release-testing"
          else
            EXPORT_METHOD="app-store-connect"
          fi
          
          SIGN_IDENTITY="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/"/ {print $2; exit}')"
          
          if [ -z "$SIGN_IDENTITY" ]; then
            echo "未找到可用的签名证书"
            security find-identity -v -p codesigning build.keychain || true
            exit 1
          fi
          
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "EXPORT_METHOD=$EXPORT_METHOD" >> $GITHUB_ENV
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> $GITHUB_ENV

      - name: 生成导出配置
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$APP_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: 解析工程信息
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          PROJECT="$(find ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)"
          PROJECT_BASENAME="$(basename "${PROJECT:-}" .xcodeproj)"
          WORKSPACE_BASENAME="$(basename "${WORKSPACE:-}" .xcworkspace)"
          SHARED_SCHEME="$(find ios -path '*/xcshareddata/xcschemes/*.xcscheme' ! -path '*/Pods/*' -exec basename {} .xcscheme \; | ruby -e 'schemes = STDIN.read.split("\n").map(&:strip).reject(&:empty?).uniq; pod_like = /\A(Pods-|Expo|React|EX|hermes|FBLazyVector|RCT|RN|Yoga|glog|fmt|DoubleConversion|SocketRocket|boost)/i; preferred = schemes.find { |name| name !~ pod_like } || schemes.first; puts((preferred || "").to_s)')"
          
          if [ -n "$WORKSPACE" ]; then
            SCHEME="$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'data = JSON.parse(STDIN.read); schemes = data.dig("workspace", "schemes") || data.dig("project", "schemes") || []; candidates = [ENV["PROJECT_BASENAME"], ENV["WORKSPACE_BASENAME"], ENV["SHARED_SCHEME"]].reject(&:nil?).reject(&:empty?); pod_like = /\A(Pods-|Expo|React|EX|hermes|FBLazyVector|RCT|RN|Yoga|glog|fmt|DoubleConversion|SocketRocket|boost)/i; preferred = candidates.find { |name| schemes.include?(name) } || schemes.find { |name| name !~ pod_like } || schemes.first; puts((preferred || "").to_s)')"
            echo "XCODE_CONTAINER=$WORKSPACE" >> $GITHUB_ENV
            echo "XCODE_CONTAINER_KIND=workspace" >> $GITHUB_ENV
          elif [ -n "$PROJECT" ]; then
            SCHEME="$(xcodebuild -list -json -project "$PROJECT" | ruby -rjson -e 'data = JSON.parse(STDIN.read); schemes = data.dig("project", "schemes") || data.dig("workspace", "schemes") || []; candidates = [ENV["PROJECT_BASENAME"], ENV["WORKSPACE_BASENAME"], ENV["SHARED_SCHEME"]].reject(&:nil?).reject(&:empty?); pod_like = /\A(Pods-|Expo|React|EX|hermes|FBLazyVector|RCT|RN|Yoga|glog|fmt|DoubleConversion|SocketRocket|boost)/i; preferred = candidates.find { |name| schemes.include?(name) } || schemes.find { |name| name !~ pod_like } || schemes.first; puts((preferred || "").to_s)')"
            echo "XCODE_CONTAINER=$PROJECT" >> $GITHUB_ENV
            echo "XCODE_CONTAINER_KIND=project" >> $GITHUB_ENV
          else
            echo "未找到 iOS 原生工程文件"
            exit 1
          fi
          
          if [ -z "$SCHEME" ] && [ -n "$SHARED_SCHEME" ]; then
            SCHEME="$SHARED_SCHEME"
          fi
          
          if [ -z "$SCHEME" ]; then
            echo "未找到可用的主应用 Scheme"
            exit 1
          fi
          
          echo "XCODE_SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "使用的工程: ${WORKSPACE:-$PROJECT}"
          echo "使用的 Scheme: $SCHEME"

      - name: 构建已签名 Archive
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/App.xcarchive"
          ARCHIVE_LOG="$RUNNER_TEMP/xcodebuild-archive.log"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> $GITHUB_ENV
          echo "ARCHIVE_LOG=$ARCHIVE_LOG" >> $GITHUB_ENV
          
          set -o pipefail
          if [ "$XCODE_CONTAINER_KIND" = "workspace" ]; then
            xcodebuild archive \
              -workspace "$XCODE_CONTAINER" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              2>&1 | tee "$ARCHIVE_LOG"
          else
            xcodebuild archive \
              -project "$XCODE_CONTAINER" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              2>&1 | tee "$ARCHIVE_LOG"
          fi

          ARCHIVE_STATUS=$?
          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "Archive failed, showing last 200 log lines"
            tail -n 200 "$ARCHIVE_LOG" || true
            exit "$ARCHIVE_STATUS"
          fi

      - name: 导出已签名 IPA
        run: |
          EXPORT_LOG="$RUNNER_TEMP/xcodebuild-export.log"
          echo "EXPORT_LOG=$EXPORT_LOG" >> $GITHUB_ENV

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            2>&1 | tee "$EXPORT_LOG"

          EXPORT_STATUS=$?
          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "Export failed, showing last 200 log lines"
            tail -n 200 "$EXPORT_LOG" || true
            exit "$EXPORT_STATUS"
          fi
          
          echo "✅ 已签名 IPA 已生成"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: signed-ipa
          path: ${{ runner.temp }}/ipa/App.ipa

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
